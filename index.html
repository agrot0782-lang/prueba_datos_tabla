<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Trabajadores</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}

h2{
    text-align:center;
}

.container{
    max-width:1200px;
    margin:auto;
}

input{
    padding:10px;
    width:300px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#007bff;
    color:white;
    padding:10px;
    cursor:pointer;
}

td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f1f1f1;
}

.activo{
    color:green;
    font-weight:bold;
}

.baja{
    color:red;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">
<h2>👷 Lista de Trabajadores</h2>

<input type="text" id="buscador" placeholder="Buscar nombre o ID...">

<table id="tabla">
<thead>
<tr>
<th onclick="ordenar('id')">ID ⬍</th>
<th onclick="ordenar('nombre')">Nombre ⬍</th>
<th onclick="ordenar('apellido_paterno')">Apellido P ⬍</th>
<th onclick="ordenar('apellido_materno')">Apellido M ⬍</th>
<th onclick="ordenar('sexo')">Sexo ⬍</th>
<th onclick="ordenar('zona')">Zona ⬍</th>
<th onclick="ordenar('estado')">Estado ⬍</th>
<th>Acción</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div style="margin-top:15px; text-align:center;">
    <button onclick="anterior()">⬅️ Anterior</button>
    <span id="info"></span>
    <button onclick="siguiente()">Siguiente ➡️</button>
</div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
  <div style="background:white; padding:20px; margin:10% auto; width:300px; border-radius:10px;">
    <h3>Detalle</h3>
    <div id="detalle"></div>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<script>

// 🔥 CONFIG FIREBASE
var firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "terraflux-database.firebaseapp.com",
  databaseURL: "https://terraflux-database-default-rtdb.firebaseio.com",
  projectId: "terraflux-database"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let datos = {};
let lista = [];
let pagina = 1;
let porPagina = 50;
let asc = true;

// 🚀 CARGAR DATOS
function cargarDatos(){
    db.ref("trabajadores").once("value")
    .then(snapshot => {
        datos = snapshot.val() || {};
        lista = Object.entries(datos);
        pagina = 1;
        renderTabla();
    });
}

// 📊 RENDER TABLA
function renderTabla(){

    let tbody = document.querySelector("#tabla tbody");
    let inicio = (pagina - 1) * porPagina;
    let fin = inicio + porPagina;

    let html = "";

    lista.slice(inicio, fin).forEach(([id, t]) => {

        let claseEstado = t.estado === "ACTIVO" ? "activo" : "baja";

        html += `
        <tr>
            <td>${id}</td>
            <td>${t.nombre}</td>
            <td>${t.apellido_paterno}</td>
            <td>${t.apellido_materno}</td>
            <td>${t.sexo}</td>
            <td>${t.zona}</td>
            <td class="${claseEstado}">${t.estado}</td>
            <td><button onclick="verDetalle('${id}')">👁</button></td>
        </tr>
        `;
    });

    tbody.innerHTML = html;

    document.getElementById("info").innerText =
        `Página ${pagina} de ${Math.ceil(lista.length / porPagina)} | Total: ${lista.length}`;
}

// 🔄 PAGINACIÓN
function siguiente(){
    if(pagina * porPagina < lista.length){
        pagina++;
        renderTabla();
    }
}

function anterior(){
    if(pagina > 1){
        pagina--;
        renderTabla();
    }
}

// 🔍 BUSCADOR
document.getElementById("buscador").addEventListener("keyup", function(){

    let filtro = this.value.toLowerCase();

    lista = Object.entries(datos).filter(([id, t]) => {
        let texto = (id + t.nombre + t.apellido_paterno + t.apellido_materno).toLowerCase();
        return texto.includes(filtro);
    });

    pagina = 1;
    renderTabla();
});

// 🔃 ORDENAR
function ordenar(campo){

    lista.sort((a, b) => {

        let valA = campo === "id" ? a[0] : a[1][campo] || "";
        let valB = campo === "id" ? b[0] : b[1][campo] || "";

        return asc 
            ? valA.localeCompare(valB)
            : valB.localeCompare(valA);
    });

    asc = !asc;
    renderTabla();
}

// 👁 DETALLE
function verDetalle(id){

    let t = datos[id];

    let html = `
    <p><b>ID:</b> ${id}</p>
    <p><b>Nombre:</b> ${t.nombre}</p>
    <p><b>Apellido P:</b> ${t.apellido_paterno}</p>
    <p><b>Apellido M:</b> ${t.apellido_materno}</p>
    <p><b>Sexo:</b> ${t.sexo}</p>
    <p><b>Zona:</b> ${t.zona}</p>
    <p><b>Estado:</b> ${t.estado}</p>
    <p><b>Ingreso:</b> ${t.fecha_ingreso}</p>
    `;

    document.getElementById("detalle").innerHTML = html;
    document.getElementById("modal").style.display = "block";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

// 🔥 AUTO LOAD
window.onload = cargarDatos;

</script>

</body>
</html>
